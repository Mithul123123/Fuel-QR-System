<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Vehicle - Fuel QR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">Fuel QR System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
                    <li class="nav-item"><a class="nav-link" href="view.html">View All</a></li>
                    <li class="nav-item"><a class="nav-link" href="search.html">Search</a></li>
                    <li class="nav-item"><a class="nav-link active" href="update.html">Update</a></li>
                    <li class="nav-item"><a class="nav-link" href="delete.html">Delete</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
               
                <div class="card mt-0 mb-4">
                    <div class="card-header text-center bg-warning text-dark">
                        <h4>Update Vehicle Details</h4>
                    </div>
                    <div class="card-body">
                        <div id="message-box" class="alert text-center" role="alert"></div>

                        <p class="text-muted small mb-3">Enter the Registration Number of the vehicle you want to update.</p>
                        <div class="input-group mb-3">
                            <input type="text" id="updateSearchRegNo" class="form-control" placeholder="e.g. ABC-1234">
                            <button class="btn btn-outline-secondary" type="button" id="fetch-update-btn">Fetch Details</button>
                        </div>
                    </div>
                </div>

               
                <div class="card" id="update-form-section" style="display: none;">
                    <div class="card-body">
                        <h5 class="card-title mb-3 border-bottom pb-2">Edit Details</h5>
                        <form id="update-form">
                            <div class="mb-3">
                                <label for="updFirstName" class="form-label">First Name</label>
                                <input type="text" class="form-control" id="updFirstName" required>
                            </div>
                            <div class="mb-3">
                                <label for="updLastName" class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="updLastName" required>
                            </div>
                            <div class="mb-3">
                                <label for="updNearestStation" class="form-label">Nearest Station</label>
                                <input type="text" class="form-control" id="updNearestStation" required>
                            </div>
                            <div class="mb-4">
                                <label for="updFuelType" class="form-label">Fuel Type</label>
                                <select class="form-select" id="updFuelType" required>
                                    <option value="Petrol">Petrol</option>
                                    <option value="Diesel">Diesel</option>
                                </select>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-warning fw-bold">Save Changes</button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
