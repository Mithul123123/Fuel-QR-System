<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Vehicle - Fuel QR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">Fuel QR System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
                    <li class="nav-item"><a class="nav-link" href="view.html">View All</a></li>
                    <li class="nav-item"><a class="nav-link" href="search.html">Search</a></li>
                    <li class="nav-item"><a class="nav-link" href="update.html">Update</a></li>
                    <li class="nav-item"><a class="nav-link active" href="delete.html">Delete</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-danger mt-0">
                    <div class="card-header text-center bg-danger text-white">
                        <h4>Delete Vehicle Record</h4>
                    </div>
                    <div class="card-body">
                        <div id="message-box" class="alert text-center" role="alert"></div>

                        <p class="text-muted text-center mb-4">Warning: Deleting a vehicle record is permanent and cannot be undone.</p>
                        
                        <div class="mb-4">
                            <label for="deleteRegNo" class="form-label fw-bold">Enter Registration Number to Delete:</label>
                            <input type="text" id="deleteRegNo" class="form-control form-control-lg" placeholder="e.g. ABC-1234">
                        </div>
                        
                        <div class="d-grid">
                            <button id="delete-btn" class="btn btn-danger btn-lg">Permanently Delete</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
